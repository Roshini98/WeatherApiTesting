# serenity.conf

serenity.project.name = "Weather API project"

environments {
    default {
        base.url = "https://api.weatherbit.io/v2.0"
    }
    all {
        weather.api.key = ${WEATHER_API_KEY}
    }
}
serenity {
    take.screenshots = FOR_EACH_ACTION
    console.colors = true
    logging = "VERBOSE"
}

restassured {
    # This is the "glue" that records the console output into the HTML
    filters = "net.serenitybdd.rest.filters.FieldsRecordingFilter"
}